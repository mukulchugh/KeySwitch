<!doctype html><html><head><meta charset="utf-8"><style>
  html,body{margin:0}
  .canvas{width:1024px;height:1024px;display:flex;align-items:center;justify-content:center;
    background:#0b0b16;font-family:-apple-system,BlinkMacSystemFont,sans-serif}
  .tile{width:832px;height:832px;border-radius:186px;position:relative;overflow:hidden;
    background:radial-gradient(120% 120% at 22% 12%, #7c5cff 0%, #6d3ff0 34%, #4b1fb0 70%, #2b1170 100%);
    box-shadow:inset 0 3px 10px rgba(255,255,255,.28), inset 0 -10px 40px rgba(0,0,0,.35),
      0 40px 90px rgba(60,20,160,.45)}
  .tile::before{content:"";position:absolute;inset:0;border-radius:186px;
    background:linear-gradient(160deg, rgba(255,255,255,.18), rgba(255,255,255,0) 42%)}
  .tile svg{position:absolute;inset:0;margin:auto;width:560px;height:560px;
    filter:drop-shadow(0 10px 24px rgba(0,0,0,.35))}
</style></head><body>
  <div class="canvas"><div class="tile">MARK</div></div>
</body></html>
